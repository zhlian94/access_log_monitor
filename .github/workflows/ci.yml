name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install deps
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Lint (using flake8 – you can change to pylint/black)
      - name: Lint code
        run: |
          pip install flake8
          flake8 *.py

      # Build Docker image (same as your manual command)
      - name: Build Docker image
        run: |
          docker build -t access-log-monitor:latest .
